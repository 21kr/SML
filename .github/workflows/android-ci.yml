name: Android CI

on:
  push:
    branches: [ "main", "work" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build and unit checks
    runs-on: ubuntu-latest

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx2g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install required SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 🔥 IMPORTANT: Ensure no invalid Java override
      - name: Remove invalid Gradle Java home (if exists)
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/org.gradle.java.home/d' gradle.properties
          fi
          if [ -f android/gradle.properties ]; then
            sed -i '/org.gradle.java.home/d' android/gradle.properties
          fi

      - name: Domain tests
        run: ./gradlew :domain:test --stacktrace --no-daemon

      - name: Build
        run: ./gradlew build --stacktrace --no-daemon

  instrumentation:
    name: Emulator instrumentation (smoke)
    runs-on: ubuntu-latest
    needs: build

    env:
      GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx2g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install required SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # 🔥 Same fix here
      - name: Remove invalid Gradle Java home (if exists)
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/org.gradle.java.home/d' gradle.properties
          fi
          if [ -f android/gradle.properties ]; then
            sed -i '/org.gradle.java.home/d' android/gradle.properties
          fi

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: ./gradlew connectedDebugAndroidTest --stacktrace --no-daemon
